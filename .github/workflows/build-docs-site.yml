name: Build Docs Site

on:
  push:
    branches:
      - main
    paths:
      - "docs/**/*.md"
      - "docs/build_site.py"
      - "docs/assets/site.css"
      - "docs/assets/**"
      - ".github/workflows/build-docs-site.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build generated HTML
        run: python docs/build_site.py

      - name: Commit generated HTML
        run: |
          if git diff --quiet -- docs/*.html; then
            echo "Generated HTML already matches Markdown."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/*.html
            git commit -m "Build docs site"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
